# agentoast configuration

[toast]
duration_ms = 10000

[notification]
filter_notified_only = false
show_non_agent_panes = true
muted = false

[notification.agents.claude_code]
events = ["Stop", "permission_prompt", "auth_success", "elicitation_dialog", "idle_prompt"]
focus_events = ["permission_prompt"]

[keybinding]
# Cmd+'  (Quote = apostrophe key)
toggle_panel = "super+Quote"
